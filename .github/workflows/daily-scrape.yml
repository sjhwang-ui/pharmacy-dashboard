name: Daily Dashboard Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          ALLTHATPAY_ID: ${{ secrets.ALLTHATPAY_ID }}
          ALLTHATPAY_PW: ${{ secrets.ALLTHATPAY_PW }}
          TAXFREE_ID: ${{ secrets.TAXFREE_ID }}
          TAXFREE_PW: ${{ secrets.TAXFREE_PW }}
        run: python scraper.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/
